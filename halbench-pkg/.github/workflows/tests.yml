name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install
        run: |
          pip install --upgrade pip
          pip install -e '.[dev]'
      - name: Run pytest (no network)
        # Tests that don't need HF/OpenRouter creds
        run: pytest tests/ -v -k "not network"
